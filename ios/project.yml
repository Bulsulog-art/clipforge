name: ClipForge
options:
  bundleIdPrefix: com.bulsulabs
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  RevenueCatUI:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

targets:
  ClipForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ClipForge
      - Shared
    resources: [ClipForge/Resources]
    info:
      path: ClipForge/Info.plist
      properties:
        CFBundleDisplayName: ClipForge
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        # Locales we ship Localizable.xcstrings translations for. Adding a
        # value here makes iOS render the localised UI when the user's
        # device language matches; unmatched strings fall back to en.
        CFBundleLocalizations: [en, tr]
        CFBundleDevelopmentRegion: en
        UILaunchScreen: {}
        NSCameraUsageDescription: "ClipForge needs camera access to record video for clips."
        NSPhotoLibraryUsageDescription: "ClipForge needs photo library access to import videos."
        NSPhotoLibraryAddUsageDescription: "ClipForge needs to save finished clips to your Photos library."
        NSMicrophoneUsageDescription: "ClipForge needs microphone access to record audio."
        UIBackgroundModes: [audio, processing, remote-notification, fetch]
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLSchemes: [clipforge]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: ""    # fill from Apple Developer
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: RevenueCat
      - package: RevenueCatUI
      - package: Supabase
      - package: Sentry
        product: Sentry
      - target: ClipForgeWidgets
        embed: true
        codeSign: true
      - target: ClipForgeNotificationService
        embed: true
        codeSign: true
    entitlements:
      path: ClipForge/ClipForge.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        com.apple.developer.associated-domains:
          - applinks:clipforge.bulsulabs.xyz
        aps-environment: production       # flipped for App Store submission
        com.apple.security.application-groups:
          - group.com.bulsulabs.clipforge

  ClipForgeWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ClipForgeWidgets
      - Shared
    info:
      path: ClipForgeWidgets/Info.plist
      properties:
        CFBundleDisplayName: ClipForge Widgets
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge.widgets
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SKIP_INSTALL: YES
    entitlements:
      path: ClipForgeWidgets/ClipForgeWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bulsulabs.clipforge

  ClipForgeNotificationService:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources: [ClipForgeNotificationService]
    info:
      path: ClipForgeNotificationService/Info.plist
      properties:
        CFBundleDisplayName: ClipForge Push Service
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge.pushservice
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SKIP_INSTALL: YES

