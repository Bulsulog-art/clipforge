name: ClipForge
options:
  bundleIdPrefix: com.bulsulabs
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  RevenueCatUI:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"

targets:
  ClipForge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ClipForge
      - Shared
    resources: [ClipForge/Resources]
    info:
      path: ClipForge/Info.plist
      properties:
        CFBundleDisplayName: ClipForge
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "6"
        # Locales we ship Localizable.xcstrings translations for. Adding a
        # value here makes iOS render the localised UI when the user's
        # device language matches; unmatched strings fall back to en.
        CFBundleLocalizations: [en, tr, es]
        CFBundleDevelopmentRegion: en
        UILaunchScreen: {}
        # Portrait-only vertical-video app. UIRequiresFullScreen opts out of iPad
        # multitasking so Apple doesn't require all four orientations (validation 90474).
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown]
        UIRequiresFullScreen: true
        NSCameraUsageDescription: "ClipForge needs camera access to record video for clips."
        NSPhotoLibraryUsageDescription: "ClipForge needs photo library access to import videos."
        NSPhotoLibraryAddUsageDescription: "ClipForge needs to save finished clips to your Photos library."
        NSMicrophoneUsageDescription: "ClipForge needs microphone access to record audio."
        # Only modes the app actually uses: push (remote-notification) + BGAppRefreshTask
        # (fetch). 'audio' (no background audio playback) + 'processing' (no BGProcessingTask)
        # were unjustified and triggered App Review Guideline 2.5.4.
        UIBackgroundModes: [remote-notification, fetch]
        BGTaskSchedulerPermittedIdentifiers:
          - com.bulsulabs.clipforge.refresh
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLSchemes: [clipforge]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: "YA6Y85MSY6"    # fill from Apple Developer
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # iPhone-only: portrait vertical-video app. Avoids the App Store iPad
        # screenshot requirement (APP_IPAD_PRO_3GEN_129) for a non-iPad experience.
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: RevenueCat
      - package: RevenueCatUI
      - package: Supabase
      - package: Sentry
        product: Sentry
      - target: ClipForgeWidgets
        embed: true
        codeSign: true
      - target: ClipForgeNotificationService
        embed: true
        codeSign: true
    entitlements:
      path: ClipForge/ClipForge.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        com.apple.developer.associated-domains:
          - applinks:clipforge.bulsulabs.xyz
        aps-environment: production       # flipped for App Store submission
        com.apple.security.application-groups:
          - group.com.bulsulabs.clipforge

  ClipForgeWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ClipForgeWidgets
      - Shared
    info:
      path: ClipForgeWidgets/Info.plist
      properties:
        CFBundleDisplayName: ClipForge Widgets
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "6"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge.widgets
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: "YA6Y85MSY6"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SKIP_INSTALL: YES
    entitlements:
      path: ClipForgeWidgets/ClipForgeWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bulsulabs.clipforge

  ClipForgeNotificationService:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources: [ClipForgeNotificationService]
    info:
      path: ClipForgeNotificationService/Info.plist
      properties:
        CFBundleDisplayName: ClipForge Push Service
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "6"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge.pushservice
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: "YA6Y85MSY6"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SKIP_INSTALL: YES

  # MARK: - Paired Apple Watch app
  #
  # Standalone watchOS targets (not embedded in the iPhone app right now
  # — App Store pairing config lives in the watch app's Info.plist via
  # WKApplication + WKCompanionAppBundleIdentifier). We keep them as
  # siblings so xcodebuild can verify each with a watchOS Simulator
  # destination without dragging in iOS-only frameworks during iOS
  # builds.
  #
  # The watch app reads `SharedAppState` from its own App Group
  # UserDefaults (App Groups don't cross devices); the iPhone pushes
  # snapshots via WatchConnectivity in `WatchSyncBridge`, which writes
  # them on the watch side.

  ClipForgeWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - ClipForgeWatch
      - Shared
    info:
      path: ClipForgeWatch/Info.plist
      properties:
        CFBundleDisplayName: ClipForge
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "6"
        CFBundleDevelopmentRegion: en
        WKApplication: true
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: com.bulsulabs.clipforge
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge.watchkitapp
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: "YA6Y85MSY6"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        TARGETED_DEVICE_FAMILY: "4"
    dependencies:
      - target: ClipForgeWatchWidgets
        embed: true
        codeSign: true
    entitlements:
      path: ClipForgeWatch/ClipForgeWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bulsulabs.clipforge

  ClipForgeWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - ClipForgeWatchWidgets
      - Shared
    info:
      path: ClipForgeWatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: ClipForge Watch Widgets
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "6"
        CFBundleDevelopmentRegion: en
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bulsulabs.clipforge.watchkitapp.widgets
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: "YA6Y85MSY6"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "4"
    entitlements:
      path: ClipForgeWatchWidgets/ClipForgeWatchWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bulsulabs.clipforge

