<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 2796px; overflow: hidden; font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #1A1326; }
  body { position: relative; background:
    radial-gradient(circle at 18% 5%, rgba(255,51,102,0.18) 0%, transparent 40%),
    radial-gradient(circle at 85% 26%, rgba(255,102,153,0.14) 0%, transparent 44%),
    linear-gradient(168deg, #FFFFFF 0%, #FFF4F7 48%, #FFF9FB 100%); }
  .sp { position: absolute; color: #FF3366; opacity: 0.5; } .sp::before { content: "✦"; }
  .s1 { top: 250px; right: 120px; font-size: 76px; opacity: 0.45; } .s2 { top: 520px; left: 100px; font-size: 48px; opacity: 0.4; }
  .copy { position: absolute; top: 190px; left: 84px; right: 84px; text-align: center; }
  .eyebrow { font-size: 33px; font-weight: 800; letter-spacing: 7px; text-transform: uppercase; color: #FF3366; margin-bottom: 28px; }
  .headline { font-size: 122px; font-weight: 900; line-height: 1.0; letter-spacing: -3px; color: #15101F; }
  .headline .grad { background: linear-gradient(95deg,#FF2A5F,#FF6699); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { margin-top: 30px; font-size: 46px; font-weight: 500; line-height: 1.3; color: #6B6675; max-width: 1010px; margin: 30px auto 0; }
  .phone { position: absolute; bottom: -150px; left: 50%; transform: translateX(-50%); width: 928px; height: 1860px; border-radius: 96px; background: #FFFFFF; padding: 20px; box-shadow: 0 50px 120px rgba(255,51,102,0.22), 0 0 0 3px rgba(255,255,255,0.9), inset 0 0 0 1px rgba(255,51,102,0.12); }
  .screen { width: 100%; height: 100%; border-radius: 78px; overflow: hidden; position: relative; background: linear-gradient(180deg,#FFFFFF,#FFF7F9); }
  .status { height: 66px; display: flex; justify-content: space-between; align-items: center; padding: 0 72px; font-size: 30px; font-weight: 700; color:#15101F; }
  .nav { text-align: center; padding: 6px 0 22px; font-size: 34px; font-weight: 800; color:#15101F; }

  .preview { margin: 0 auto 32px; width: 300px; height: 420px; border-radius: 28px; background: linear-gradient(150deg,#FF6699,#FF2A5F 140%); position: relative; box-shadow: 0 16px 38px rgba(255,51,102,0.28); }
  .preview .sc { position:absolute; top:16px; left:16px; background: rgba(255,255,255,0.92); color:#15101F; padding: 8px 16px; border-radius: 12px; font-size: 24px; font-weight: 800; }
  .preview .sc b { color:#FF3366; }
  .preview .cap { position:absolute; bottom: 22px; left:18px; right:18px; color:#fff; font-size: 30px; font-weight:900; line-height:1.05; }

  .lbl { padding: 0 50px 16px; font-size: 30px; font-weight: 700; color: #8A8590; }
  .platforms { padding: 0 48px; display: flex; flex-direction: column; gap: 18px; }
  .pf { display: flex; align-items: center; gap: 22px; padding: 26px 30px; border-radius: 24px; background:#FFFFFF; border: 2px solid #FF3366; box-shadow: 0 10px 26px rgba(255,51,102,0.10); }
  .pf .ic { width: 78px; height: 78px; border-radius: 20px; color:#fff; display:flex; align-items:center; justify-content:center; font-size: 40px; flex-shrink: 0; }
  .ttk { background: linear-gradient(135deg,#25F4EE,#FE2C55); }
  .ig { background: linear-gradient(135deg,#F58529,#DD2A7B,#8134AF); }
  .yt { background: linear-gradient(135deg,#FF0033,#CC0022); }
  .pf .nm { flex: 1; font-size: 36px; font-weight: 800; color:#15101F; }
  .pf .chk { width: 56px; height: 56px; border-radius: 50%; background: #FF3366; color: #fff; display:flex; align-items:center; justify-content:center; font-size: 32px; box-shadow: 0 0 16px rgba(255,51,102,0.4); }

  .cta { margin: 34px 48px 0; padding: 30px; border-radius: 999px; background: linear-gradient(90deg,#FF2A5F,#FF6699); color:#fff; text-align: center; font-size: 38px; font-weight: 900; box-shadow: 0 16px 40px rgba(255,51,102,0.4); }
</style>
</head>
<body>
  <span class="sp s1"></span><span class="sp s2"></span>
  <div class="copy">
    <div class="eyebrow">One-tap publishing</div>
    <h1 class="headline">Post everywhere.<br/><span class="grad">One tap.</span></h1>
    <p class="sub">Send every clip to TikTok, Reels and Shorts — now, or scheduled to drip out.</p>
  </div>
  <div class="phone"><div class="screen">
    <div class="status"><span>9:41</span><span>100%</span></div>
    <div class="nav">Publish clip</div>
    <div class="preview"><div class="sc">✦ <b>94</b></div><div class="cap">The truth nobody tells you…</div></div>
    <div class="lbl">Send to</div>
    <div class="platforms">
      <div class="pf"><div class="ic ttk">♪</div><div class="nm">TikTok</div><div class="chk">✓</div></div>
      <div class="pf"><div class="ic ig">◉</div><div class="nm">Instagram Reels</div><div class="chk">✓</div></div>
      <div class="pf"><div class="ic yt">▶</div><div class="nm">YouTube Shorts</div><div class="chk">✓</div></div>
    </div>
    <div class="cta">Post to all 3 →</div>
  </div></div>
</body>
</html>
