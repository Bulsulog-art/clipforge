<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 2796px; overflow: hidden; font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #fff; }
  body {
    background:
      radial-gradient(circle at 50% 5%, rgba(255,255,255,0.20) 0%, transparent 38%),
      radial-gradient(circle at 90% 95%, rgba(0,0,0,0.50) 0%, transparent 55%),
      linear-gradient(160deg, #052E16 0%, #047857 25%, #0EA5E9 60%, #4F46E5 100%);
  }
  .bg-sparkle { position: absolute; color: #fff; }
  .bg-sparkle::before { content: "✦"; }
  .sp1 { top: 190px; left: 110px; font-size: 60px; opacity: 0.5; }
  .sp2 { top: 400px; right: 120px; font-size: 95px; opacity: 0.6; }
  .sp3 { bottom: 1080px; right: 80px; font-size: 50px; opacity: 0.4; }
  .sp4 { bottom: 340px; left: 100px; font-size: 70px; opacity: 0.55; }

  .copy { position: absolute; top: 200px; left: 80px; right: 80px; text-align: center; }
  .eyebrow { font-size: 38px; font-weight: 700; letter-spacing: 8px; text-transform: uppercase; color: #6EE7B7; margin-bottom: 32px; }
  .headline { font-size: 130px; font-weight: 900; line-height: 1.02; letter-spacing: -3px; margin-bottom: 36px; text-shadow: 0 4px 24px rgba(0,0,0,0.25); }
  .grad { background: linear-gradient(90deg, #FEF08A 0%, #FCD34D 50%, #FB923C 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 50px; font-weight: 500; line-height: 1.3; color: rgba(255,255,255,0.85); max-width: 1050px; margin: 0 auto; }

  .phone { position: absolute; bottom: -180px; left: 50%; transform: translateX(-50%); width: 920px; height: 1880px; border-radius: 100px; background: linear-gradient(180deg, #051010 0%, #02050A 100%); padding: 22px; box-shadow: 0 60px 120px rgba(0,0,0,0.55), 0 0 0 4px rgba(255,255,255,0.08), inset 0 0 0 2px rgba(255,255,255,0.06); }
  .screen { width: 100%; height: 100%; border-radius: 80px; background: #02050A; overflow: hidden; position: relative; }
  .status { height: 64px; display: flex; justify-content: space-between; align-items: center; padding: 0 80px; font-size: 30px; font-weight: 600; }

  .video-area {
    position: relative;
    margin: 24px 24px 0;
    height: 1290px;
    border-radius: 36px;
    overflow: hidden;
    background:
      linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.65) 100%),
      radial-gradient(circle at 50% 35%, #1F2937 0%, #0F172A 100%);
  }
  /* Mock person silhouette */
  .person {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #FBBF24, #92400E);
    border: 4px solid rgba(255,255,255,0.2);
  }
  .body-shape {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    border-radius: 50% 50% 0 0;
    background: linear-gradient(180deg, #1E40AF, #1E293B);
  }

  /* Captions stack */
  .captions {
    position: absolute;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    width: 90%;
  }
  .caption-line {
    display: inline-block;
    padding: 18px 32px;
    border-radius: 18px;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    margin: 4px 6px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  .c-y { background: #FCD34D; color: #1F2937; }
  .c-w { background: #FFFFFF; color: #1F2937; }
  .c-a { background: #FCD34D; color: #1F2937; transform: rotate(-2deg); }
  .c-hl { background: linear-gradient(135deg, #FB923C, #EC4899); color: #fff; transform: rotate(1.5deg); }

  /* Top engagement overlay */
  .engagement {
    position: absolute;
    top: 40px;
    right: 40px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    padding: 18px 26px;
    border-radius: 18px;
    font-size: 28px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .engagement .live-dot { width: 14px; height: 14px; background: #EF4444; border-radius: 50%; }

  /* Style picker tray */
  .style-tray {
    margin: 20px 24px;
    padding: 28px 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
  }
  .style-tray .label { font-size: 30px; font-weight: 700; margin-bottom: 18px; color: rgba(255,255,255,0.9); }
  .style-row { display: flex; gap: 16px; overflow-x: auto; }
  .style-chip {
    flex-shrink: 0;
    padding: 18px 28px;
    border-radius: 999px;
    font-size: 26px;
    font-weight: 700;
    background: rgba(255,255,255,0.08);
    border: 2px solid transparent;
  }
  .style-chip.active { background: linear-gradient(90deg, #FBBF24, #FB923C); color: #1F2937; border-color: #fff; }
  .style-chip.yellow { color: #FCD34D; }
  .style-chip.pink { color: #F472B6; }
  .style-chip.cyan { color: #67E8F9; }
  .style-chip.green { color: #86EFAC; }

  .lang-row { display: flex; gap: 14px; margin: 20px 24px 0; }
  .lang-chip {
    padding: 16px 22px;
    border-radius: 16px;
    background: rgba(255,255,255,0.06);
    font-size: 26px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .lang-chip.active { background: rgba(6,182,212,0.3); color: #67E8F9; border: 1px solid #06B6D4; }
</style>
</head>
<body>
  <span class="bg-sparkle sp1"></span>
  <span class="bg-sparkle sp2"></span>
  <span class="bg-sparkle sp3"></span>
  <span class="bg-sparkle sp4"></span>

  <div class="copy">
    <div class="eyebrow">Auto Captions</div>
    <h1 class="headline">Captions that<br/><span class="grad">stop the scroll.</span></h1>
    <p class="sub">Whisper-grade transcription. Auto-translated to 12+ languages.</p>
  </div>

  <div class="phone">
    <div class="screen">
      <div class="status"><span>9:41</span><span>100%</span></div>

      <div class="video-area">
        <div class="person"></div>
        <div class="body-shape"></div>
        <div class="engagement"><span class="live-dot"></span>0:08 / 0:42</div>
        <div class="captions">
          <span class="caption-line c-w">If you want</span>
          <span class="caption-line c-y">to go viral</span>
          <span class="caption-line c-hl">START HERE</span>
        </div>
      </div>

      <div class="style-tray">
        <div class="label">Translate to</div>
        <div class="style-row">
          <div class="style-chip active">🇺🇸 English</div>
          <div class="style-chip yellow">🇹🇷 Türkçe</div>
          <div class="style-chip pink">🇪🇸 Español</div>
          <div class="style-chip cyan">🇫🇷 Français</div>
          <div class="style-chip green">+12 more</div>
        </div>
      </div>

      <div class="lang-row">
        <div class="lang-chip active">🌐 EN</div>
        <div class="lang-chip">ES</div>
        <div class="lang-chip">DE</div>
        <div class="lang-chip">PT</div>
        <div class="lang-chip">+ 8</div>
      </div>
    </div>
  </div>
</body>
</html>
